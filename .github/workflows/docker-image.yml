zap_scan:
  name: DAST Scan (ZAP)
  runs-on: ubuntu-latest
  needs: security-scan-sast-sca
  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Start Vampi service
      run: |
        docker run -d --name vampi -p 5000:5000 erev0s/vampi:latest

    - name: Prepare ZAP workspace
      run: |
        mkdir -p $PWD/zap-temp
        chmod 777 $PWD/zap-temp

    - name: Run ZAP Baseline Scan
      run: |
        docker run --rm \
          --network host \
          -v $PWD/zap-temp:/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://localhost:5000 \
          -r /zap/wrk/zap_report.html

    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap-temp/zap_report.html