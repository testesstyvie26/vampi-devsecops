name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  security-scan-sast-sca:
    name: SAST & SCA Scans
    runs-on: ubuntu-latest
    steps:
      # -------------------
      # Checkout code
      # -------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -------------------
      # SAST - Semgrep
      # -------------------
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      # -------------------
      # SCA - Snyk
      # -------------------
      - name: Run Snyk Test (show vulnerabilities without failing)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          json: false
        continue-on-error: true  # Step não quebra pipeline

      - name: Run Snyk Monitor (Dashboard)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

      # -------------------
      # Build application
      # -------------------
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping pip install"
          fi

      - name: Start services
        run: docker compose up -d

  zap_scan:
  name: DAST Scan (ZAP)
  runs-on: ubuntu-latest
  needs: security-scan-sast-sca
  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Start the Vampi container
    - name: Start Vampi service
      run: |
        docker run -d --name vampi -p 5000:5000 erev0s/vampi:latest

    # Prepare folder for ZAP report
    - name: Prepare ZAP workspace
      run: |
        mkdir -p $PWD/zap-temp
        chmod 777 $PWD/zap-temp

    # Run ZAP Baseline Scan
    - name: Run ZAP Baseline Scan
      run: |
        docker run --rm \
          -v $PWD/zap-temp:/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py -t http://host.docker.internal:5000 -r /zap/wrk/zap_report.html

    # Upload report
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: zap-temp/zap_report.html